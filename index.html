<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reporting — Betting Backoffice</title>
<style>
  :root {
    --bg: #f4f6f9;
    --panel: #ffffff;
    --border: #e3e8ef;
    --border-strong: #cdd5e0;
    --text: #1d2733;
    --muted: #69788c;
    --accent: #2f6df6;
    --accent-soft: #eaf1ff;
    --pos: #12824a;
    --neg: #d23f3f;
    --row-hover: #f7f9fc;
    --shadow: 0 1px 2px rgba(16,24,40,.06), 0 1px 3px rgba(16,24,40,.10);
    --radius: 10px;
    --depth-tint: #f0f4fa;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); font-size: 13px; -webkit-font-smoothing: antialiased;
  }
  .app { max-width: 1400px; margin: 0 auto; padding: 24px; }
  .topbar { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:8px;}
  .topbar h1 { font-size: 20px; margin: 0; font-weight: 650; letter-spacing:-.2px;}
  .topbar .sub { color: var(--muted); font-size: 12px; }

  .kpis { display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; margin-bottom:18px; }
  .kpi { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow);}
  .kpi .label { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.4px; font-weight:600;}
  .kpi .value { font-size:20px; font-weight:650; margin-top:6px; letter-spacing:-.3px;}
  .kpi .value.pos { color:var(--pos);} .kpi .value.neg { color:var(--neg);}

  .panel { background:var(--panel); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:18px;}
  .panel-head { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .panel-head h2 { font-size:13px; margin:0; font-weight:650; }
  .panel-head .hint { color:var(--muted); font-size:11px; font-weight:400;}
  .panel-body { padding:16px; }

  .section-grid { display:grid; grid-template-columns: 1fr 1fr; gap:18px; }
  @media (max-width: 980px){ .section-grid { grid-template-columns:1fr; } .kpis{ grid-template-columns: repeat(2,1fr);} }

  /* unified controls container */
  .controls { padding:0; }
  .controls .controls-grid { display:grid; grid-template-columns:1fr 1fr; }
  .controls .controls-grid > .panel { border:none; box-shadow:none; border-radius:0; margin:0; }
  .controls .controls-grid > .panel:first-child { border-right:1px solid var(--border); }
  .controls .controls-grid:not(:last-child) { border-bottom:1px solid var(--border); }
  @media (max-width: 980px){
    .controls .controls-grid { grid-template-columns:1fr; }
    .controls .controls-grid > .panel:first-child { border-right:none; border-bottom:1px solid var(--border); }
  }

  .group-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  .chip {
    display:inline-flex; align-items:center; gap:8px; padding:7px 12px; border:1px solid var(--border-strong);
    border-radius:999px; cursor:pointer; user-select:none; background:#fff; font-size:12.5px; font-weight:550; transition:.12s;
  }
  .chip:hover { border-color:var(--accent); }
  .chip.on { background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }
  .chip.locked { cursor:not-allowed; background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }
  .chip .order-no { font-size:10px; background:var(--accent); color:#fff; width:16px; height:16px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-weight:700;}
  .chip .box { width:14px; height:14px; border:1.5px solid var(--border-strong); border-radius:4px; display:inline-flex; align-items:center; justify-content:center; }
  .chip.on .box, .chip.locked .box { background:var(--accent); border-color:var(--accent); }
  .chip .box svg { width:10px; height:10px; }

  .filters { display:grid; grid-template-columns: repeat(3, 1fr); gap:14px; }
  @media (max-width:760px){ .filters{ grid-template-columns:1fr 1fr;} }
  .filter label { display:block; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.3px; margin-bottom:5px;}
  .ms { position:relative; }
  .ms-toggle {
    width:100%; text-align:left; border:1px solid var(--border-strong); background:#fff; border-radius:8px; padding:8px 30px 8px 10px;
    cursor:pointer; font-size:12.5px; color:var(--text); position:relative; min-height:34px; line-height:1.4;
  }
  .ms-toggle.placeholder { color:var(--muted); }
  .ms-toggle:after { content:"▾"; position:absolute; right:10px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:10px;}
  .ms-menu {
    position:absolute; z-index:30; top:calc(100% + 4px); left:0; right:0; background:#fff; border:1px solid var(--border-strong);
    border-radius:8px; box-shadow:0 8px 24px rgba(16,24,40,.14); max-height:260px; overflow:auto; padding:6px;
  }
  .ms-search { width:100%; border:1px solid var(--border); border-radius:6px; padding:6px 8px; margin-bottom:6px; font-size:12px;}
  .ms-opt { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:6px; cursor:pointer; font-size:12.5px;}
  .ms-opt:hover { background:var(--row-hover);}
  .ms-opt .cb { width:14px; height:14px; border:1.5px solid var(--border-strong); border-radius:4px; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;}
  .ms-opt.sel .cb { background:var(--accent); border-color:var(--accent);}
  .ms-opt .cb svg { width:10px; height:10px;}
  .ms-tools { display:flex; justify-content:space-between; padding:4px 6px 2px; border-top:1px solid var(--border); margin-top:4px;}
  .ms-tools button { background:none; border:none; color:var(--accent); cursor:pointer; font-size:11.5px; font-weight:600; padding:2px 4px;}
  .ms-empty { color:var(--muted); padding:8px; font-size:12px; }

  .toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .btn { border:1px solid var(--border-strong); background:#fff; border-radius:8px; padding:7px 12px; cursor:pointer; font-size:12.5px; font-weight:600; color:var(--text);}
  .btn:hover { border-color:var(--accent); color:var(--accent);}
  .search-box { border:1px solid var(--border-strong); border-radius:8px; padding:8px 10px; font-size:12.5px; max-width:220px;}
  .btn.preset.on { background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn.primary:hover { filter:brightness(1.05); color:#fff; }
  .period-row { display:flex; align-items:flex-end; gap:18px; flex-wrap:wrap; }
  .period-field { display:flex; flex-direction:column; gap:5px; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.3px; }
  .date-input { border:1px solid var(--border-strong); border-radius:8px; padding:8px 10px; font-size:12.5px; color:var(--text); font-family:inherit; }
  .date-input:focus { outline:none; border-color:var(--accent); }
  .bettor-input { border:1px solid var(--border-strong); border-radius:8px; padding:8px 10px; font-size:12.5px; width:240px; max-width:100%; font-family:inherit; color:var(--text); }
  .bettor-input:focus { outline:none; border-color:var(--accent); }
  .bettor-status { font-size:12px; font-weight:600; }
  .bettor-status.ok { color:var(--pos); }
  .bettor-status.err { color:var(--neg); }
  .spacer { flex:1; }
  .pill-count { background:var(--accent-soft); color:var(--accent); padding:3px 8px; border-radius:999px; font-size:11px; font-weight:650; }

  .table-wrap { overflow:auto; border-radius:var(--radius); }
  table { border-collapse:collapse; width:100%; font-size:12.5px; }
  thead th {
    position:sticky; top:0; z-index:5; background:#f8fafc; text-align:right; padding:11px 14px; font-weight:650; color:var(--muted);
    border-bottom:1px solid var(--border-strong); font-size:11px; text-transform:uppercase; letter-spacing:.4px; white-space:nowrap;
  }
  thead th.lbl { text-align:left; }
  thead th.sortable { cursor:pointer; user-select:none; }
  thead th.sortable:hover { color:var(--text); }
  thead th.active { color:var(--accent); }
  .sort-caret { font-size:9px; margin-left:5px; opacity:.55; }
  thead th.active .sort-caret { opacity:1; }
  tbody td { padding:0; border-bottom:1px solid var(--border); text-align:right; white-space:nowrap; }
  tbody td .cell { padding:9px 14px; }
  tbody tr:hover { background:var(--row-hover); }
  td.lbl { text-align:left; }
  td.lbl .cell { display:flex; align-items:center; gap:7px; padding-left:14px;}
  .twisty { width:16px; height:16px; display:inline-flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted); flex-shrink:0; transition:transform .12s; border-radius:4px;}
  .twisty:hover { background:var(--border); color:var(--text);}
  .twisty.open { transform:rotate(90deg); }
  .twisty.leaf { visibility:hidden; }
  .dim-tag { font-size:9.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--muted); background:#eef2f7; border-radius:4px; padding:1px 5px; font-weight:700; flex-shrink:0;}
  .name { font-weight:550; overflow:hidden; text-overflow:ellipsis; }
  .row-total td { font-weight:700; border-top:2px solid var(--border-strong); border-bottom:2px solid var(--border-strong); background:#fbfcfe;}
  .row-total .name { font-weight:750; }
  .num { font-variant-numeric: tabular-nums; }
  .pos { color:var(--pos);} .neg { color:var(--neg);}
  .muted { color:var(--muted); }
  .bar { height:5px; border-radius:3px; background:var(--depth-tint); position:relative; overflow:hidden; width:60px; display:inline-block; vertical-align:middle;}
  .bar > i { position:absolute; left:0; top:0; bottom:0; border-radius:3px; }
  .empty-state { padding:48px; text-align:center; color:var(--muted); }
  .legend { color:var(--muted); font-size:11px; padding:8px 16px; border-top:1px solid var(--border); display:flex; gap:18px; flex-wrap:wrap;}
  .footer-note { color:var(--muted); font-size:11px; text-align:center; margin-top:8px;}
</style>
</head>
<body>
<div id="root"></div>

<script>
"use strict";
/* =================================================================
   Self-contained reporting prototype — NO external dependencies.
   Pure vanilla JS, renders offline / via file://.
   ================================================================= */

/* ----------------------------- Mock data ----------------------------- */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
var rng = mulberry32(20260623);
function ri(lo,hi){return Math.floor(rng()*(hi-lo+1))+lo;}
function rf(lo,hi){return rng()*(hi-lo)+lo;}
function pick(arr){return arr[Math.floor(rng()*arr.length)];}

var SPORT_TREE = {
  "Football": { "England": ["Premier League","Championship"], "Spain": ["La Liga"], "Italy": ["Serie A"], "Germany": ["Bundesliga"] },
  "Tennis": { "ATP": ["Wimbledon","US Open"], "WTA": ["Roland Garros"] },
  "Basketball": { "USA": ["NBA"], "Europe": ["EuroLeague"] },
  "Ice Hockey": { "USA": ["NHL"], "Sweden": ["SHL"] },
  "eSports": { "Counter-Strike 2": ["IEM Major"], "Dota 2": ["The International"] },
  "American Football": { "USA": ["NFL","NCAA"] },
  "Baseball": { "USA": ["MLB"], "Japan": ["NPB"] },
  "Rugby": { "England": ["Premiership"], "International": ["Six Nations"] },
  "MMA": { "UFC": ["UFC Fight Night","UFC Main Card"] },
  "Cricket": { "India": ["IPL"], "International": ["Test Series"] },
  "Volleyball": { "Italy": ["SuperLega"] },
  "Handball": { "Germany": ["HBL"] },
  "Darts": { "PDC": ["World Championship"] },
  "Snooker": { "World": ["World Championship"] },
  "Formula 1": { "World": ["Grand Prix"] }
};
var TEAMS = {
  "Football": ["Arsenal","Chelsea","Liverpool","Man City","Real Madrid","Barcelona","Juventus","Inter","Bayern","Dortmund","Napoli","Atletico"],
  "Tennis": ["Djokovic","Alcaraz","Sinner","Medvedev","Swiatek","Sabalenka","Gauff","Rybakina"],
  "Basketball": ["Lakers","Celtics","Warriors","Bucks","Real Madrid","Barcelona","Olympiacos","Fenerbahce"],
  "Ice Hockey": ["Bruins","Rangers","Maple Leafs","Oilers","Frolunda","Skelleftea","Lulea","Vaxjo"],
  "eSports": ["NAVI","FaZe","Vitality","G2","Spirit","Liquid","Falcons","MOUZ"],
  "American Football": ["Chiefs","49ers","Cowboys","Eagles","Bills","Ravens","Bengals","Lions"],
  "Baseball": ["Yankees","Dodgers","Red Sox","Cubs","Giants","Mets","Astros","Braves"],
  "Rugby": ["Saracens","Leicester","Munster","Leinster","Toulouse","England","Ireland","France"],
  "MMA": ["Jones","Adesanya","Makhachev","Pereira","O'Malley","Volkanovski","Edwards","Du Plessis"],
  "Cricket": ["Mumbai","Chennai","Bangalore","Kolkata","India","Australia","England","Pakistan"],
  "Volleyball": ["Perugia","Modena","Trento","Civitanova","Milano","Piacenza","Monza","Verona"],
  "Handball": ["Kiel","Flensburg","Magdeburg","Berlin","Melsungen","Lemgo","Hannover","Gummersbach"],
  "Darts": ["Price","van Gerwen","Smith","Humphries","Wright","Cross","Aspinall","Clayton"],
  "Snooker": ["O'Sullivan","Trump","Robertson","Selby","Williams","Higgins","Allen","Brecel"],
  "Formula 1": ["Verstappen","Norris","Leclerc","Hamilton","Russell","Piastri","Sainz","Perez"]
};
// Mean payout-to-stake ratio per sport. > 1.0 means the book runs at a LOSS
// for that sport (negative GGR) — included to show negative examples.
var SPORT_BIAS = {
  "MMA": 1.08, "Darts": 1.05, "Formula 1": 1.10, "Snooker": 1.04, "Cricket": 1.02
};
var DEFAULT_BIAS = 0.85;
// Reporting "today" — event dates are spread across the 60 days up to here.
var BASE_DATE = "2026-06-23";
function isoMinus(baseStr, days){ var d=new Date(baseStr+"T00:00:00"); d.setDate(d.getDate()-days); return d.toISOString().slice(0,10); }
var MARKETS = [
  { name:"Match Result", outcomes:["Home","Draw","Away"] },
  { name:"Total (Over/Under)", outcomes:["Over","Under"] },
  { name:"Both Teams To Score", outcomes:["Yes","No"] }
];
// Pool of bettor account IDs; each outcome line is attributed to one of them.
var BETTORS = []; for (var _b=0; _b<40; _b++) BETTORS.push(String(100001+_b));

function buildRecords(){
  var recs=[], id=0;
  Object.keys(SPORT_TREE).forEach(function(sport){
    Object.keys(SPORT_TREE[sport]).forEach(function(category){
      SPORT_TREE[sport][category].forEach(function(tournament){
        var nEvents=ri(3,6), teams=TEAMS[sport];
        for(var e=0;e<nEvents;e++){
          var a=pick(teams), b=pick(teams); while(b===a) b=pick(teams);
          var event=a+" vs "+b;
          var date=isoMinus(BASE_DATE, ri(0,59));
          var markets = sport==="Tennis"
            ? [{name:"Match Winner",outcomes:["Player 1","Player 2"]}, MARKETS[1]]
            : MARKETS;
          markets.forEach(function(m){
            m.outcomes.forEach(function(outcome){
              var bets=ri(4,480), avgStake=rf(8,85);
              var stake=+(bets*avgStake).toFixed(2);
              var bias=SPORT_BIAS[sport]||DEFAULT_BIAS;
              var factor=Math.max(0.45, rf(bias-0.22, bias+0.22));
              var payout=+(stake*factor).toFixed(2);
              recs.push({id:id++, sport:sport, category:category, tournament:tournament, event:event, market:m.name, outcome:outcome, date:date, bettor:pick(BETTORS), bets:bets, stake:stake, payout:payout});
            });
          });
        }
      });
    });
  });
  return recs;
}
var RECORDS = buildRecords();
var DATE_MIN = RECORDS.reduce(function(m,r){ return r.date<m?r.date:m; }, RECORDS[0].date);
var DATE_MAX = RECORDS.reduce(function(m,r){ return r.date>m?r.date:m; }, RECORDS[0].date);

/* ----------------------------- Dimensions ----------------------------- */
var DIMENSIONS = [
  {key:"sport",label:"Sport",tag:"SPT"},
  {key:"category",label:"Category",tag:"CAT"},
  {key:"tournament",label:"Tournament",tag:"TRN"},
  {key:"event",label:"Event",tag:"EVT"},
  {key:"market",label:"Market",tag:"MKT"},
  {key:"outcome",label:"Outcome",tag:"OUT"}
];
function dimByKey(k){ for(var i=0;i<DIMENSIONS.length;i++) if(DIMENSIONS[i].key===k) return DIMENSIONS[i]; }

/* ----------------------------- Helpers ----------------------------- */
function fmtMoney(n){ return "€"+Math.round(n).toLocaleString("en-US"); }
function fmtNum(n){ return n.toLocaleString("en-US"); }
function fmtPct(n){ return n.toFixed(1)+"%"; }
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }

function emptyMetrics(){ return {bets:0,stake:0,payout:0}; }
function addMetrics(acc,r){ acc.bets+=r.bets; acc.stake+=r.stake; acc.payout+=r.payout; return acc; }
function deriveMetrics(m){ var ggr=m.stake-m.payout; var margin=m.stake>0?(ggr/m.stake)*100:0; return {bets:m.bets,stake:m.stake,payout:m.payout,ggr:ggr,margin:margin}; }

function applyFilters(records, filters, exceptKey){
  return records.filter(function(r){
    for(var i=0;i<DIMENSIONS.length;i++){
      var k=DIMENSIONS[i].key; if(k===exceptKey) continue;
      var sel=filters[k];
      if(sel && sel.length && sel.indexOf(r[k])===-1) return false;
    }
    return true;
  });
}

function buildTree(records, groupKeys){
  function group(recs, depth, parentPath){
    if(depth>=groupKeys.length) return null;
    var key=groupKeys[depth], map=new Map();
    recs.forEach(function(r){ var v=r[key]; if(!map.has(v)) map.set(v,[]); map.get(v).push(r); });
    var nodes=[];
    map.forEach(function(childRecs, value){
      var path=parentPath+"›"+value;
      var metrics=childRecs.reduce(addMetrics, emptyMetrics());
      nodes.push({
        path:path, value:value, dimKey:key, dimTag:dimByKey(key).tag,
        depth:depth, metrics:deriveMetrics(metrics),
        children:group(childRecs, depth+1, path)
      });
    });
    return nodes;
  }
  return group(records,0,"") || [];
}

function sortTree(nodes){
  var key=state.sortKey, dir=state.sortDir==="asc"?1:-1;
  function cmp(a,b){
    if(key==="name") return a.value.localeCompare(b.value, undefined, {numeric:true})*dir;
    return (a.metrics[key]-b.metrics[key])*dir;
  }
  function walk(list){ list.sort(cmp); list.forEach(function(n){ if(n.children) walk(n.children); }); }
  walk(nodes);
  return nodes;
}

function collectExpandable(nodes, acc){
  nodes.forEach(function(n){ if(n.children && n.children.length){ acc.add(n.path); collectExpandable(n.children, acc); } });
  return acc;
}
function filterTree(nodes, q){
  return nodes.map(function(n){
    var kids = n.children ? filterTree(n.children, q) : null;
    var self = n.value.toLowerCase().indexOf(q)!==-1;
    if(self || (kids && kids.length)) return {path:n.path,value:n.value,dimKey:n.dimKey,dimTag:n.dimTag,depth:n.depth,metrics:n.metrics,children:kids};
    return null;
  }).filter(Boolean);
}

/* ----------------------------- State ----------------------------- */
var state = {
  grouping: { sport:true },
  filters: {},               // key -> [values]
  expanded: new Set(),
  search: "",
  openMenu: null,            // dimension key whose dropdown is open
  menuQuery: "",
  sortKey: "ggr",            // name | bets | stake | payout | ggr | margin
  sortDir: "desc",           // asc | desc
  dateFrom: (isoMinus(DATE_MAX,29) < DATE_MIN ? DATE_MIN : isoMinus(DATE_MAX,29)),
  dateTo: DATE_MAX,
  bettor: "",                // applied bettor ID ("" = all bettors)
  bettorInput: ""            // current text in the ID box (uncommitted)
};

function groupKeys(){ return DIMENSIONS.filter(function(d){ return !!state.grouping[d.key]; }).map(function(d){ return d.key; }); }

/* ----------------------------- SVG bits ----------------------------- */
var CHEVRON = '<svg viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var CHECK = '<svg viewBox="0 0 12 12" fill="none"><path d="M2.5 6.5l2.2 2.2L9.5 3.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';

/* ----------------------------- Render ----------------------------- */
function inDateRange(r){ return r.date>=state.dateFrom && r.date<=state.dateTo; }

function compute(){
  var gk = groupKeys();
  var dated = RECORDS.filter(inDateRange);
  var bettorOptions = Object.keys(dated.reduce(function(a,r){ a[r.bettor]=true; return a; },{})).sort();
  var base = state.bettor ? dated.filter(function(r){ return r.bettor===state.bettor; }) : dated;
  var filterOptions = {};
  DIMENSIONS.forEach(function(d){
    var pool = applyFilters(base, state.filters, d.key);
    var set = {}; pool.forEach(function(r){ set[r[d.key]]=true; });
    filterOptions[d.key] = Object.keys(set).sort();
  });
  var filtered = applyFilters(base, state.filters, null);
  var tree = buildTree(filtered, gk);
  if(state.search.trim()) tree = filterTree(tree, state.search.toLowerCase());
  sortTree(tree);
  var totals = deriveMetrics(filtered.reduce(addMetrics, emptyMetrics()));
  var maxGgr = 1; tree.forEach(function(n){ maxGgr=Math.max(maxGgr, Math.abs(n.metrics.ggr)); });
  return {gk:gk, filterOptions:filterOptions, totals:totals, tree:tree, maxGgr:maxGgr, datedCount:base.length, bettorOptions:bettorOptions, sampleBettor:(bettorOptions[0]||"100001")};
}

function metricCells(m){
  return ''
    + '<td class="num"><div class="cell">'+fmtNum(m.bets)+'</div></td>'
    + '<td class="num"><div class="cell">'+fmtMoney(m.stake)+'</div></td>'
    + '<td class="num"><div class="cell">'+fmtMoney(m.payout)+'</div></td>'
    + '<td class="num"><div class="cell"><span class="'+(m.ggr>=0?'pos':'neg')+'">'+fmtMoney(m.ggr)+'</span></div></td>';
}

function rowsHtml(nodes, maxGgr){
  var out="";
  function walk(list){
    list.forEach(function(n){
      var isOpen=state.expanded.has(n.path);
      var hasKids=n.children && n.children.length;
      var m=n.metrics;
      var barPct = maxGgr>0 ? Math.max(2, Math.min(100, (Math.abs(m.ggr)/maxGgr)*100)) : 0;
      var barColor = m.ggr>=0 ? "var(--pos)" : "var(--neg)";
      out += '<tr>'
        + '<td class="lbl"><div class="cell" style="padding-left:'+(14+n.depth*20)+'px">'
          + '<span class="twisty '+(hasKids?(isOpen?'open':''):'leaf')+'" '+(hasKids?('data-path="'+esc(n.path)+'"'):'')+'>'+CHEVRON+'</span>'
          + '<span class="dim-tag">'+n.dimTag+'</span>'
          + '<span class="name" title="'+esc(n.value)+'">'+esc(n.value)+'</span>'
          + (hasKids?'<span class="muted">· '+n.children.length+'</span>':'')
        + '</div></td>'
        + metricCells(m)
        + '<td class="num"><div class="cell">'
          + '<span class="'+(m.margin>=0?'pos':'neg')+'" style="margin-right:8px">'+fmtPct(m.margin)+'</span>'
          + '<span class="bar"><i style="width:'+barPct+'%;background:'+barColor+'"></i></span>'
        + '</div></td>'
      + '</tr>';
      if(hasKids && isOpen) walk(n.children);
    });
  }
  walk(nodes);
  return out;
}

function sortableTh(key, label, cls){
  var active = state.sortKey===key;
  var caret = active ? (state.sortDir==="asc" ? "▲" : "▼") : "▾";
  return '<th class="sortable'+(cls?' '+cls:'')+(active?' active':'')+'" data-sort="'+key+'">'
    + esc(label)+'<span class="sort-caret">'+caret+'</span></th>';
}

function tableHtml(data){
  var hasGrouping = data.gk.length>0;
  var headLabel = hasGrouping ? data.gk.map(function(k){ return dimByKey(k).label; }).join(" › ") : "Total";
  var hint = hasGrouping ? ('grouped by '+esc(headLabel)) : 'no grouping · totals only';
  var t=data.totals;
  var body = '<tr class="row-total">'
    + '<td class="lbl"><div class="cell"><span class="twisty leaf"></span><span class="name">Total</span></div></td>'
    + metricCells(t)
    + '<td class="num"><div class="cell"><span class="'+(t.margin>=0?'pos':'neg')+'">'+fmtPct(t.margin)+'</span></div></td>'
    + '</tr>';
  if(hasGrouping){
    body += data.tree.length===0
      ? '<tr><td colspan="6"><div class="empty-state">No data matches the current filters.</div></td></tr>'
      : rowsHtml(data.tree, data.maxGgr);
  }

  return ''
  + '<div class="panel">'
    + '<div class="panel-head">'
      + '<h2>Report</h2>'
      + '<span class="hint">'+hint+'</span>'
      + '<span class="spacer"></span>'
      + '<div class="toolbar">'
        + '<input id="search-input" class="search-box" placeholder="Search rows…" value="'+esc(state.search)+'">'
        + '<button class="btn" id="expand-all">Expand all</button>'
        + '<button class="btn" id="collapse-all">Collapse all</button>'
      + '</div>'
    + '</div>'
    + '<div class="table-wrap"><table>'
      + '<thead><tr>'
        + sortableTh("name", headLabel, "lbl")
        + sortableTh("bets", "Bets")
        + sortableTh("stake", "Turnover")
        + sortableTh("payout", "Payout")
        + sortableTh("ggr", "GGR")
        + sortableTh("margin", "Margin")
      + '</tr></thead>'
      + '<tbody>'+body+'</tbody>'
    + '</table></div>'
    + '<div class="legend">'
      + '<span><b>GGR</b> = Turnover − Payout</span>'
      + '<span><b>Margin</b> = GGR ÷ Turnover</span>'
      + '<span>Every group row is a summary of its children — collapse to roll up, expand to drill down.</span>'
    + '</div>'
  + '</div>';
}

function groupPanelHtml(){
  var gk=groupKeys();
  var chips = DIMENSIONS.map(function(d){
    var on = !!state.grouping[d.key];
    var orderNo = gk.indexOf(d.key);
    return '<div class="chip '+(on?'on':'')+'" data-group="'+d.key+'">'
      + '<span class="box">'+(on?CHECK:'')+'</span>'+d.label
      + (on && orderNo>=0 ? '<span class="order-no">'+(orderNo+1)+'</span>' : '')
      + '</div>';
  }).join("");
  return '<div class="panel"><div class="panel-head"><h2>Group by</h2><span class="hint">detalization levels · uncheck all for totals only</span></div>'
    + '<div class="panel-body"><div class="group-row">'+chips+'</div></div></div>';
}

function filtersPanelHtml(data){
  var activeCount = DIMENSIONS.reduce(function(a,d){ return a + ((state.filters[d.key]||[]).length?1:0); },0);
  var cells = DIMENSIONS.map(function(d){
    var opts = data.filterOptions[d.key];
    var sel = state.filters[d.key] || [];
    var summary = sel.length===0 ? ('All ('+opts.length+')') : (sel.length<=2 ? sel.join(", ") : (sel.length+' selected'));
    var menu = "";
    if(state.openMenu===d.key){
      var q = state.menuQuery.toLowerCase();
      var shown = opts.filter(function(o){ return o.toLowerCase().indexOf(q)!==-1; });
      var optsHtml = shown.length===0 ? '<div class="ms-empty">No matches</div>'
        : shown.map(function(o){
            var isSel = sel.indexOf(o)!==-1;
            return '<div class="ms-opt '+(isSel?'sel':'')+'" data-dim="'+d.key+'" data-val="'+esc(o)+'"><span class="cb">'+(isSel?CHECK:'')+'</span><span>'+esc(o)+'</span></div>';
          }).join("");
      menu = '<div class="ms-menu" data-menu="'+d.key+'">'
        + '<input id="ms-search-input" class="ms-search" placeholder="Search…" value="'+esc(state.menuQuery)+'">'
        + optsHtml
        + '<div class="ms-tools"><button class="ms-selall" data-dim="'+d.key+'">Select all</button><button class="ms-clear" data-dim="'+d.key+'">Clear</button></div>'
      + '</div>';
    }
    return '<div class="filter"><label>'+d.label+'</label><div class="ms">'
      + '<button class="ms-toggle '+(sel.length===0?'placeholder':'')+'" data-dim="'+d.key+'">'+esc(summary)+'</button>'
      + menu
      + '</div></div>';
  }).join("");

  return '<div class="panel"><div class="panel-head"><h2>Filters</h2><span class="hint">scope the report</span>'
    + (activeCount>0?'<span class="pill-count">'+activeCount+' active</span>':'')
    + '<span class="spacer"></span>'
    + (activeCount>0?'<button class="btn" id="reset-filters">Reset</button>':'')
    + '</div><div class="panel-body"><div class="filters">'+cells+'</div></div></div>';
}

function fmtDateLabel(iso){
  var d=new Date(iso+"T00:00:00");
  return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
}
function periodPanelHtml(data){
  var presets=[
    {k:"today",label:"Today"},
    {k:"yesterday",label:"Yesterday"},
    {k:"3",label:"Last 3 days"},
    {k:"7",label:"Last 7 days"},
    {k:"30",label:"Last 30 days"}
  ];
  // determine active preset
  var active="";
  if(state.dateFrom===DATE_MAX && state.dateTo===DATE_MAX) active="today";
  else if(state.dateFrom===isoMinus(DATE_MAX,1) && state.dateTo===isoMinus(DATE_MAX,1)) active="yesterday";
  else if(state.dateTo===DATE_MAX && state.dateFrom===isoMinus(DATE_MAX,2)) active="3";
  else if(state.dateTo===DATE_MAX && state.dateFrom===isoMinus(DATE_MAX,6)) active="7";
  else if(state.dateTo===DATE_MAX && state.dateFrom===isoMinus(DATE_MAX,29)) active="30";
  var presetBtns=presets.map(function(p){
    return '<button class="btn preset'+(active===p.k?' on':'')+'" data-preset="'+p.k+'">'+p.label+'</button>';
  }).join("");
  var span = '<span class="muted">'+fmtNum(data.datedCount)+' records · '+fmtDateLabel(state.dateFrom)+' → '+fmtDateLabel(state.dateTo)+'</span>';
  return '<div class="panel"><div class="panel-head"><h2>Period</h2><span class="hint">filter by event date</span>'
    + '<span class="spacer"></span><div class="toolbar">'+presetBtns+'</div></div>'
    + '<div class="panel-body"><div class="period-row">'
      + '<label class="period-field">From<input type="date" id="date-from" class="date-input" value="'+state.dateFrom+'" min="'+DATE_MIN+'" max="'+DATE_MAX+'"></label>'
      + '<label class="period-field">To<input type="date" id="date-to" class="date-input" value="'+state.dateTo+'" min="'+DATE_MIN+'" max="'+DATE_MAX+'"></label>'
      + span
    + '</div></div></div>';
}

function bettorPanelHtml(data){
  var applied = state.bettor;
  var found = applied && data.datedCount>0;
  var feedback;
  if(!applied){
    feedback = '<span class="muted">Showing <b>all bettors</b> · '+fmtNum(data.bettorOptions.length)+' active in range</span>';
  } else if(found){
    feedback = '<span class="bettor-status ok">✓ Bettor <b>'+esc(applied)+'</b> · '+fmtNum(data.datedCount)+' bet lines</span>';
  } else {
    feedback = '<span class="bettor-status err">No bets for ID “'+esc(applied)+'” in this period</span>';
  }
  return '<div class="panel"><div class="panel-head"><h2>Bettor</h2><span class="hint">report for all or a single bettor ID</span>'
    + '<span class="spacer"></span>'
    + (applied ? '<button class="btn" id="bettor-clear">All bettors</button>' : '')
    + '</div><div class="panel-body"><div class="period-row">'
      + '<input id="bettor-input" class="bettor-input" placeholder="Enter bettor ID (e.g. '+esc(data.sampleBettor)+')" value="'+esc(state.bettorInput)+'" autocomplete="off">'
      + '<button class="btn primary" id="bettor-apply">Apply</button>'
      + feedback
    + '</div></div></div>';
}

function kpisHtml(t){
  function card(label,val,cls){ return '<div class="kpi"><div class="label">'+label+'</div><div class="value'+(cls?' '+cls:'')+'">'+val+'</div></div>'; }
  return '<div class="kpis">'
    + card("Bets", fmtNum(t.bets))
    + card("Turnover", fmtMoney(t.stake))
    + card("GGR", fmtMoney(t.ggr), t.ggr>=0?'pos':'neg')
    + card("Margin", fmtPct(t.margin), t.margin>=0?'pos':'neg')
    + '</div>';
}

function render(){
  var data = compute();
  // preserve focus + caret across re-render
  var ae = document.activeElement;
  var focusId = ae && ae.id ? ae.id : null;
  var caret = (ae && typeof ae.selectionStart==="number") ? ae.selectionStart : null;

  var html = '<div class="app">'
    + '<div class="topbar"><div><h1>Reporting</h1>'
      + '<div class="sub">Turnover &amp; gross gaming revenue by hierarchy · '+fmtNum(RECORDS.length)+' outcome records</div></div>'
      + '<div class="sub">As of 2026-06-23</div></div>'
    + kpisHtml(data.totals)
    + '<div class="panel controls">'
      + '<div class="controls-grid">'+periodPanelHtml(data)+bettorPanelHtml(data)+'</div>'
      + '<div class="controls-grid">'+groupPanelHtml()+filtersPanelHtml(data)+'</div>'
    + '</div>'
    + tableHtml(data)
    + '<div class="footer-note">Mock data · single-file prototype. Wire <code>RECORDS</code> to your reporting API to go live.</div>'
    + '</div>';
  document.getElementById("root").innerHTML = html;

  if(focusId){
    var el=document.getElementById(focusId);
    if(el){ el.focus(); if(caret!=null && el.setSelectionRange){ try{ el.setSelectionRange(caret,caret); }catch(e){} } }
  }
}

/* ----------------------------- Events (delegated) ----------------------------- */
var root = document.getElementById("root");

root.addEventListener("click", function(e){
  var t = e.target;

  var chip = t.closest(".chip[data-group]");
  if(chip){
    var k = chip.getAttribute("data-group");
    if(state.grouping[k]) delete state.grouping[k]; else state.grouping[k]=true;
    state.expanded = new Set();
    render(); return;
  }

  var th = t.closest("th[data-sort]");
  if(th){
    var sk = th.getAttribute("data-sort");
    if(state.sortKey===sk){ state.sortDir = state.sortDir==="asc" ? "desc" : "asc"; }
    else { state.sortKey = sk; state.sortDir = (sk==="name") ? "asc" : "desc"; }
    render(); return;
  }

  var tw = t.closest(".twisty[data-path]");
  if(tw){
    var p = tw.getAttribute("data-path");
    if(state.expanded.has(p)) state.expanded.delete(p); else state.expanded.add(p);
    render(); return;
  }

  var pre = t.closest(".preset[data-preset]");
  if(pre){
    var p=pre.getAttribute("data-preset");
    if(p==="today"){ state.dateFrom=DATE_MAX; state.dateTo=DATE_MAX; }
    else if(p==="yesterday"){ state.dateFrom=isoMinus(DATE_MAX,1); state.dateTo=isoMinus(DATE_MAX,1); }
    else { state.dateFrom=isoMinus(DATE_MAX, parseInt(p,10)-1); state.dateTo=DATE_MAX; }
    if(state.dateFrom<DATE_MIN) state.dateFrom=DATE_MIN;
    render(); return;
  }

  if(t.closest("#expand-all")){ var d=compute(); state.expanded=collectExpandable(d.tree,new Set()); render(); return; }
  if(t.closest("#collapse-all")){ state.expanded=new Set(); render(); return; }
  if(t.closest("#reset-filters")){ state.filters={}; render(); return; }

  // Bettor by ID
  if(t.closest("#bettor-clear")){ state.bettor=""; state.bettorInput=""; render(); return; }
  if(t.closest("#bettor-apply")){ state.bettor=state.bettorInput.trim(); render(); return; }

  var sel = t.closest(".ms-selall");
  if(sel){ var dk=sel.getAttribute("data-dim"); var dd=compute(); var q=state.menuQuery.toLowerCase(); state.filters[dk]=dd.filterOptions[dk].filter(function(o){return o.toLowerCase().indexOf(q)!==-1;}); render(); return; }
  var clr = t.closest(".ms-clear");
  if(clr){ state.filters[clr.getAttribute("data-dim")]=[]; render(); return; }

  var opt = t.closest(".ms-opt[data-dim]");
  if(opt){
    var dim=opt.getAttribute("data-dim"), val=opt.getAttribute("data-val");
    var arr=(state.filters[dim]||[]).slice();
    var idx=arr.indexOf(val);
    if(idx===-1) arr.push(val); else arr.splice(idx,1);
    state.filters[dim]=arr;
    render(); return;
  }

  var tog = t.closest(".ms-toggle[data-dim]");
  if(tog){
    var d2=tog.getAttribute("data-dim");
    state.openMenu = (state.openMenu===d2) ? null : d2;
    state.menuQuery="";
    render(); return;
  }

  // click outside any dropdown closes it
  if(state.openMenu && !t.closest(".ms-menu")){ state.openMenu=null; state.menuQuery=""; render(); }
});

root.addEventListener("input", function(e){
  if(e.target.id==="search-input"){ state.search=e.target.value; render(); return; }
  if(e.target.id==="ms-search-input"){ state.menuQuery=e.target.value; render(); return; }
  // track ID typing without re-render so the field keeps focus; applied on Enter/Apply
  if(e.target.id==="bettor-input"){ state.bettorInput=e.target.value; return; }
});

root.addEventListener("change", function(e){
  if(e.target.id==="date-from"){
    var v=e.target.value || DATE_MIN;
    state.dateFrom=v; if(state.dateFrom>state.dateTo) state.dateTo=state.dateFrom;
    render(); return;
  }
  if(e.target.id==="date-to"){
    var v2=e.target.value || DATE_MAX;
    state.dateTo=v2; if(state.dateTo<state.dateFrom) state.dateFrom=state.dateTo;
    render(); return;
  }
});

document.addEventListener("keydown", function(e){
  if(e.key==="Escape" && state.openMenu){ state.openMenu=null; state.menuQuery=""; render(); }
  if(e.key==="Enter" && e.target.id==="bettor-input"){ state.bettorInput=e.target.value; state.bettor=state.bettorInput.trim(); render(); }
});

render();
</script>
</body>
</html>
